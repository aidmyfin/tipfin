kind = "web"
previewPath = "/"
title = "TIPFIN"
version = "1.0.0"
id = "artifacts/tipfin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22853

[services.development]
run = "pnpm --filter @workspace/tipfin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tipfin", "run", "build" ]
publicDir = "artifacts/tipfin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22853"
BASE_PATH = "/"
